{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20"
     style="background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%), #020617;">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <span class="section-tag text-xs font-semibold px-4 py-1.5 rounded-full inline-block uppercase tracking-widest mb-4">
        Account Recovery
      </span>
      <h1 class="text-3xl font-black tracking-tight">Forgot <span class="gradient-text">Password</span></h1>
      <p class="text-gray-500 text-sm mt-2">Enter your email and we'll send you a reset link</p>
    </div>

    <div class="card-glass p-8">
      <form action="/forgot_password" method="POST">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Email Address</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">📧</span>
              <input type="email" name="email" required placeholder="Enter your registered email"
                     class="field-input pl-9 w-full">
            </div>
          </div>
          <button type="submit"
                  class="btn-glow w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition duration-300 text-sm tracking-wide">
            Send Reset Link →
          </button>
        </div>
      </form>
      <p class="text-center text-gray-500 text-sm mt-6">
        Remember your password? <a href="/login" class="text-emerald-400 hover:text-emerald-300 font-semibold">Back to Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
