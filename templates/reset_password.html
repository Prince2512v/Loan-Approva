{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20"
     style="background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%), #020617;">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <span class="section-tag text-xs font-semibold px-4 py-1.5 rounded-full inline-block uppercase tracking-widest mb-4">
        Secure Reset
      </span>
      <h1 class="text-3xl font-black tracking-tight">New <span class="gradient-text">Password</span></h1>
      <p class="text-gray-500 text-sm mt-2">Create a secure new password for your account</p>
    </div>

    <div class="card-glass p-8">
      <form action="/reset_password" method="POST">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">New Password</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">🔒</span>
              <input type="password" name="password" id="pwd" required placeholder="Min 6 characters"
                     class="field-input pl-9 w-full">
              <button type="button" onclick="togglePwd('pwd')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 text-xs">Show</button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Confirm Password</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">🔒</span>
              <input type="password" name="confirm_password" id="confirm_pwd" required placeholder="Repeat new password"
                     class="field-input pl-9 w-full">
              <button type="button" onclick="togglePwd('confirm_pwd')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 text-xs">Show</button>
            </div>
          </div>
          <button type="submit"
                  class="btn-glow w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition duration-300 text-sm tracking-wide">
            Update Password →
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(id) {
  const p = document.getElementById(id);
  p.type = p.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
