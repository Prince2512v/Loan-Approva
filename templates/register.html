{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20"
     style="background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%), #020617;">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <span class="section-tag text-xs font-semibold px-4 py-1.5 rounded-full inline-block uppercase tracking-widest mb-4">
        New Account
      </span>
      <h1 class="text-3xl font-black tracking-tight">Create <span class="gradient-text">Account</span></h1>
      <p class="text-gray-500 text-sm mt-2">Join LoanDecide — it's free</p>
    </div>

    <div class="card-glass p-8">
      <form action="/register" method="POST">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Username</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">👤</span>
              <input type="text" name="username" required placeholder="Choose a username"
                     class="field-input pl-9 w-full">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Email</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">✉️</span>
              <input type="email" name="email" required placeholder="your@email.com"
                     class="field-input pl-9 w-full">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Password</label>
            <input type="password" name="password" id="pwd" required
                   placeholder="At least 6 characters" class="field-input w-full">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Confirm Password</label>
            <input type="password" name="confirm_password" id="cpwd" required
                   placeholder="Repeat password" class="field-input w-full">
            <p id="pwd-match" class="text-xs mt-1 hidden text-red-400">Passwords do not match.</p>
          </div>
          <button type="submit"
                  class="btn-glow w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition duration-300 text-sm tracking-wide">
            Create Account →
          </button>
        </div>
      </form>
      <p class="text-center text-gray-500 text-sm mt-6">
        Already have an account? <a href="/login" class="text-emerald-400 hover:text-emerald-300 font-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const pwd = document.getElementById('pwd');
  const cpwd = document.getElementById('cpwd');
  const matchMsg = document.getElementById('pwd-match');
  cpwd.addEventListener('input', () => {
    matchMsg.classList.toggle('hidden', pwd.value === cpwd.value);
  });
</script>
{% endblock %}
