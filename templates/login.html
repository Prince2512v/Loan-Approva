{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20"
     style="background: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%), #020617;">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <span class="section-tag text-xs font-semibold px-4 py-1.5 rounded-full inline-block uppercase tracking-widest mb-4">
        Secure Access
      </span>
      <h1 class="text-3xl font-black tracking-tight">Welcome <span class="gradient-text">Back</span></h1>
      <p class="text-gray-500 text-sm mt-2">Sign in to access your loan dashboard</p>
    </div>

    <div class="card-glass p-8">
      <form action="/login" method="POST" id="loginForm">
        <div class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Username or Email</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">👤</span>
              <input type="text" name="username" required placeholder="Enter your identifier"
                     class="field-input pl-9 w-full">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Password</label>
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-500">🔒</span>
              <input type="password" name="password" id="pwd" required placeholder="Enter your password"
                     class="field-input pl-9 w-full">
              <button type="button" onclick="togglePwd()" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 text-xs">Show</button>
            </div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-gray-400 cursor-pointer">
              <input type="checkbox" name="remember" class="accent-emerald-500 w-4 h-4"> Remember me
            </label>
            <a href="/forgot_password" class="text-emerald-400 hover:text-emerald-300 font-medium transition duration-200">Forgot Password?</a>
          </div>
          <button type="submit"
                  class="btn-glow w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition duration-300 text-sm tracking-wide">
            Sign In →
          </button>
        </div>
      </form>
      <p class="text-center text-gray-500 text-sm mt-6">
        No account? <a href="/register" class="text-emerald-400 hover:text-emerald-300 font-semibold">Create one</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePwd() {
  const p = document.getElementById('pwd');
  p.type = p.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
